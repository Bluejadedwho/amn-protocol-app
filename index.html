<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wacky Focus">

<link rel="apple-touch-icon" href="https://fav.farm/🦄">
<link rel="icon" href="https://fav.farm/🦄">

<title>Wacky Focus</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --bg-color: #FF00FF;
    --card-bg: #FFFF00;
    --text-color: #000000;
    --accent-color: #00FFFF;
    --priority-color: #FFD700;
    --success-color: #32CD32;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
    background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
    background-size: 400% 400%;
    animation: gradientBG 30s ease infinite;
    color: var(--text-color);
    margin: 0;
    padding: 20px;
    padding-top: env(safe-area-inset-top);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding-bottom: 50px;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  canvas {
    pointer-events: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
  }

  .container {
    max-width: 600px;
    width: 100%;
    background: var(--card-bg);
    padding: 20px;
    border: 5px solid black;
    box-shadow: 10px 10px 0px rgba(0,0,0,1);
    border-radius: 20px;
    height: fit-content;
    position: relative;
    z-index: 10;
    margin-bottom: 20px;
  }

  .date-header {
    font-size: 1.5rem;
    font-weight: bold;
    margin-bottom: 20px;
    border-bottom: 4px dashed black;
    padding-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-btn {
    font-size: 1rem;
    font-weight: bold;
    background: #fff;
    border: 3px solid black;
    padding: 8px 12px;
    cursor: pointer;
    box-shadow: 3px 3px 0px black;
    border-radius: 8px;
  }

  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  input[type="text"] {
    flex-grow: 1;
    padding: 15px;
    border: 3px solid black;
    border-radius: 10px;
    font-size: 18px;
    outline: none;
    background: #fff;
  }

  .action-btn {
    padding: 10px 15px;
    background-color: var(--accent-color);
    color: black;
    border: 3px solid black;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 900;
    box-shadow: 4px 4px 0px black;
    flex-shrink: 0;
  }
  
  .action-btn:active {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0px black;
  }

  ul {
    list-style: none;
    padding: 0;
    margin-bottom: 30px;
  }

  li {
    background: #fff;
    border: 3px solid black;
    margin-bottom: 15px;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 10px;
    box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }

  li.completed {
    background: #e0e0e0;
    border-color: #666;
    box-shadow: none;
    opacity: 1;
  }
  
  li.completed span.task-text {
    text-decoration: line-through;
    text-decoration-thickness: 3px;
    text-decoration-color: red;
    color: #555;
  }

  .check-btn {
    width: 40px;
    height: 40px;
    border: 3px solid black;
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 5px;
  }

  li.completed .check-btn {
    background-color: var(--success-color);
    border-color: black;
  }
  
  li.completed .check-btn::after {
    content: 'YEAH';
    font-weight: bold;
    font-size: 10px;
    color: black;
  }

  .task-text {
    flex-grow: 1;
    font-size: 1.1rem;
    line-height: 1.3;
    cursor: pointer;
    padding: 5px;
    user-select: none;
  }

  .star-btn {
    background: white;
    border: 3px solid black;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .star-btn.is-priority {
    background: var(--priority-color);
    color: white;
    box-shadow: 2px 2px 0px black;
  }

  .delete-btn {
    background: #ff6b6b;
    border: 3px solid black;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    font-size: 16px;
    width: 35px;
    height: 35px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .notes-section {
    margin-top: 40px;
    border-top: 4px dashed black;
    padding-top: 20px;
  }

  h2 { font-size: 1.5rem; text-transform: uppercase; margin-bottom: 10px; }

  .note-item {
    background: #e0ffff;
    border: 2px solid black;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 0px 15px 0px 15px; 
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Data Buttons Section */
  .data-section {
    margin-top: 40px;
    border-top: 4px dashed black;
    padding-top: 20px;
    text-align: center;
  }
  
  .data-btn {
    background: white;
    border: 2px solid black;
    padding: 8px 12px;
    margin: 5px;
    font-size: 14px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 3px 3px 0px #ccc;
  }

  /* Modal */
  .modal {
    display: none; 
    position: fixed; 
    z-index: 2000; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%; 
    background-color: rgba(0,0,0,0.8); 
    backdrop-filter: blur(5px);
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background-color: #fff;
    padding: 20px;
    border: 5px solid black;
    box-shadow: 10px 10px 0px #ff00ff;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .close-modal {
    float: right;
    font-size: 28px;
    font-weight: 900;
    cursor: pointer;
    padding: 10px;
  }

  .history-entry { border-bottom: 3px dashed #ccc; padding: 15px 0; }
  .history-date { font-weight: bold; background: yellow; display: inline-block; padding: 2px 5px; border: 2px solid black;}

</style>
</head>
<body>

<div class="container">
  <div class="date-header">
    <span id="current-date">Today</span>
    <button class="history-btn" onclick="openHistory()">📜 Old Stuff</button>
  </div>

  <div class="input-group">
    <input type="text" id="task-input" placeholder="What needs doing?!" onkeypress="handleTaskEnter(event)">
    <button class="action-btn" onclick="addTask()">DO IT</button>
  </div>
  
  <ul id="task-list"></ul>

  <div class="notes-section">
    <h2>🧠 Brain Dump</h2>
    <div class="input-group">
      <input type="text" id="note-input" placeholder="New thought..." onkeypress="handleNoteEnter(event)">
      <button class="action-btn" style="background-color: #ff69b4;" onclick="addNote()">SAVE</button>
    </div>
    <div id="note-list"></div>
  </div>

  <div class="data-section">
    <p style="font-size:0.8rem; margin-bottom:5px;">DATA BACKUP (iCloud Safe)</p>
    <button class="data-btn" onclick="downloadFile()">💾 Download Backup File</button>
    <button class="data-btn" onclick="importData()">📂 Load Backup File</button>
    <input type="file" id="file-input" style="display:none" onchange="handleFileSelect(event)">
  </div>
</div>

<div id="history-modal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeHistory()">&times;</span>
    <h2>The Ghost of Productivity Past</h2>
    <div id="history-list"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'rollover_app_final_v6';
  let appData = {
    currentDate: new Date().toDateString(),
    tasks: [], 
    notes: [], 
    history: []
  };

  window.onload = function() {
    loadData();
    sortTasks(false); 
    render();
    document.getElementById('current-date').innerText = new Date().toDateString();
  };

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    const todayStr = new Date().toDateString();

    if (stored) {
      const parsedData = JSON.parse(stored);
      
      if (parsedData.tasks) {
        parsedData.tasks.forEach(t => {
          if (!t.id) t.id = Math.floor(Math.random() * 10000000);
        });
      }

      if (parsedData.currentDate !== todayStr) {
        const archiveEntry = {
          date: parsedData.currentDate,
          tasks: parsedData.tasks,
          notes: Array.isArray(parsedData.notes) ? parsedData.notes : (parsedData.notes ? [parsedData.notes] : [])
        };
        const newHistory = [archiveEntry, ...(parsedData.history || [])];
        const rolledOverTasks = parsedData.tasks.filter(t => !t.completed);
        
        appData = {
          currentDate: todayStr,
          tasks: rolledOverTasks,
          notes: [],
          history: newHistory
        };
        saveData(); 
      } else {
        appData = parsedData;
        if (!Array.isArray(appData.notes)) appData.notes = appData.notes ? [appData.notes] : [];
        if(!appData.history) appData.history = [];
      }
    } else {
      appData.currentDate = todayStr;
    }
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  }

  // --- ACTIONS ---

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (text) {
      appData.tasks.push({ 
        id: Date.now(), 
        text: text, 
        completed: false, 
        priority: false 
      });
      input.value = '';
      saveData();
      render(); 
    }
  }

  function toggleTask(id) {
    const task = appData.tasks.find(t => t.id === id);
    if (!task) return;

    task.completed = !task.completed;
    
    if (task.completed) {
      try {
        confetti({
          particleCount: 100, 
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#FF00FF', '#FFFF00', '#00FFFF'],
          zIndex: 9999
        });
      } catch (e) {}
    }

    saveData();
    render(); 
  }

  function togglePriority(id) {
    const task = appData.tasks.find(t => t.id === id);
    if (!task) return;
    
    task.priority = !task.priority;
    sortTasks(false); 
    saveData();
    render(); 
  }

  function deleteTask(id) {
    if(confirm("Begone, task?!")) {
      appData.tasks = appData.tasks.filter(t => t.id !== id);
      saveData();
      render();
    }
  }

  function sortTasks(doRender = true) {
    appData.tasks.sort((a, b) => {
      if (a.priority && !b.priority) return -1;
      if (!a.priority && b.priority) return 1;
      return 0; 
    });
    
    if (doRender) {
      saveData(); 
      render();
    }
  }

  function addNote() {
    const input = document.getElementById('note-input');
    const text = input.value.trim();
    if (text) {
      appData.notes.push(text);
      input.value = '';
      saveData();
      render();
    }
  }

  function deleteNote(index) {
    appData.notes.splice(index, 1);
    saveData();
    render();
  }

  function handleTaskEnter(e) { if (e.key === 'Enter') addTask(); }
  function handleNoteEnter(e) { if (e.key === 'Enter') addNote(); }

  // --- FILE BACKUP SYSTEM ---
  
  function downloadFile() {
    const dataStr = JSON.stringify(appData, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = "wacky-backup-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData() {
    document.getElementById('file-input').click();
  }

  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const newData = JSON.parse(e.target.result);
        if (newData.tasks && newData.history) {
          if(confirm("This will overwrite your current data with the backup. Are you sure?")) {
            appData = newData;
            saveData();
            alert("LOADED! App will refresh.");
            location.reload();
          }
        } else {
          alert("Invalid backup file.");
        }
      } catch (err) {
        alert("Error reading file.");
      }
    };
    reader.readAsText(file);
  }

  // --- RENDER ---
  function render() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    
    appData.tasks.forEach((task) => {
      const li = document.createElement('li');
      if (task.completed) li.classList.add('completed');
      
      const checkBtn = document.createElement('button');
      checkBtn.className = 'check-btn';
      checkBtn.onclick = function() { toggleTask(task.id); };
      
      const span = document.createElement('span');
      span.className = 'task-text';
      span.innerText = task.text;
      span.onclick = function() { toggleTask(task.id); };

      const starBtn = document.createElement('button');
      starBtn.className = task.priority ? 'star-btn is-priority' : 'star-btn';
      starBtn.innerText = task.priority ? '★' : '☆';
      starBtn.onclick = function() { togglePriority(task.id); };

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerText = '🗑️';
      delBtn.onclick = function() { deleteTask(task.id); };

      li.appendChild(checkBtn);
      li.appendChild(span);
      li.appendChild(starBtn);
      li.appendChild(delBtn);
      
      list.appendChild(li);
    });

    const noteList = document.getElementById('note-list');
    noteList.innerHTML = '';
    appData.notes.forEach((note, index) => {
      const div = document.createElement('div');
      div.className = 'note-item';
      div.innerHTML = `<span>${note}</span>`;
      
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.style.background = 'none';
      delBtn.style.border = 'none';
      delBtn.style.color = 'red';
      delBtn.style.fontSize = '20px';
      delBtn.innerText = '×';
      delBtn.onclick = function() { deleteNote(index); };
      
      div.appendChild(delBtn);
      noteList.appendChild(div);
    });
  }

  function openHistory() {
    const modal = document.getElementById('history-modal');
    const historyList = document.getElementById('history-list');
    historyList.innerHTML = '';

    if (appData.history.length === 0) {
      historyList.innerHTML = '<p style="text-align:center; font-family:Comic Sans MS">No history yet.</p>';
    } else {
      appData.history.forEach(day => {
        let tasksHtml = (day.tasks || []).map(t => {
          const symbol = t.completed ? '✅' : '❌';
          return `<div style="margin-bottom:2px;">${symbol} ${t.text}</div>`;
        }).join('');
        
        let notesData = day.notes;
        if (notesData && !Array.isArray(notesData)) notesData = [notesData];
        let notesHtml = '';
        if (notesData && notesData.length) {
            notesHtml = '<div style="margin-top:5px; font-weight:bold; font-size:0.9rem;">Notes:</div>' + 
                        notesData.map(n => `<div style="font-style:italic; font-size:0.9rem; background:#eee; padding:2px;">${n}</div>`).join('');
        }

        const entry = document.createElement('div');
        entry.className = 'history-entry';
        entry.innerHTML = `<div class="history-date">${day.date}</div>${tasksHtml}${notesHtml}`;
        historyList.appendChild(entry);
      });
    }
    modal.style.display = 'flex';
  }

  function closeHistory() {
    document.getElementById('history-modal').style.display = 'none';
  }
  
  window.onclick = function(event) {
    if (event.target == document.getElementById('history-modal')) {
      closeHistory();
    }
  }
</script>

</body>
</html>
